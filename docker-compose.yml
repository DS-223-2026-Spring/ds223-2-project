services:

  db:
    container_name: postgresql_db
    image: postgres:17
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    ports:
      - 5050:80
    volumes:
      - ./pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

  # One-shot: schema + preprocessing + load_to_db (training_dataset). Needs data_raw CSVs; see docs/etl.md. API waits until exit 0.
  etl_db:
    container_name: etl_db
    build:
      context: ./AdVise/etl/db
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: db
    env_file:
      - .env
    volumes:
      - ./AdVise/etl/db:/app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  back:
    build:
      context: ./AdVise/api
      dockerfile: Dockerfile
    container_name: fastapi_back
    volumes:
      - ./AdVise/api:/api
      - ./AdVise/ds/models:/api/ds_models:ro
    ports:
      - 8008:8000
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ADVISE_DS_MODELS=/api/ds_models
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      etl_db:
        condition: service_completed_successfully

  front:
    container_name: front
    build:
      context: ./AdVise/app
      dockerfile: Dockerfile
    volumes:
      - ./AdVise/app:/app
    ports:
      - 8501:8501
    environment:
      - API_URL=http://back:8000
    depends_on:
      - back

  # Jupyter for AdVise/ds (optional). Mount full AdVise/ so paths like ../etl/... in notebooks match host layout.
  ds:
    container_name: advise_ds
    build:
      context: ./AdVise/ds
      dockerfile: Dockerfile
    profiles:
      - data-science
    ports:
      - 8888:8888
    volumes:
      - ./AdVise:/advise
    working_dir: /advise/ds
    environment:
      - PYTHONUNBUFFERED=1
      # So db_helpers can reach Postgres when the db service is on the same Compose network
      - POSTGRES_HOST=db
    env_file:
      - .env
    # Show ds, api, etl, … in the Jupyter file tree; keep kernels cwd aligned with /advise/ds
    command:
      - sh
      - -c
      - >
        exec jupyter notebook
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --allow-root
        --ServerApp.token=
        --ServerApp.password=
        --ServerApp.root_dir=/advise
