services:

  db:
    container_name: postgresql_db
    image: postgres:17
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    ports:
      - 5050:80
    volumes:
      - ./pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

  # One-shot: schema + preprocessing + load_to_db (training_dataset). Needs data_raw CSVs; see docs/etl.md. API waits until exit 0.
  etl_db:
    container_name: etl_db
    build:
      context: ./AdVise/etl/db
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: db
    env_file:
      - .env
    volumes:
      - ./AdVise/etl/db:/app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./AdVise/api
      dockerfile: Dockerfile
    container_name: fastapi_api
    volumes:
      - ./AdVise/api:/api
    ports:
      - 8008:8000
    environment:
      - DATABASE_URL=${DATABASE_URL}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      etl_db:
        condition: service_completed_successfully

  app:
    container_name: streamlit_app
    build:
      context: ./AdVise/app
      dockerfile: Dockerfile
    volumes:
      - ./AdVise/app:/app
    ports:
      - 8501:8501
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

  # Jupyter for AdVise/ds (optional)
  ds:
    container_name: advise_ds
    build:
      context: ./AdVise/ds
      dockerfile: Dockerfile
    profiles:
      - data-science
    ports:
      - 8888:8888
    volumes:
      - ./AdVise/ds:/work
    environment:
      - PYTHONUNBUFFERED=1
    working_dir: /work
