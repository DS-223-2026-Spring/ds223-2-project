name: ci

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env for Compose
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql+psycopg2://postgres:password@db:5432/marketing_db
          DB_USER=postgres
          DB_PASSWORD=password
          DB_NAME=marketing_db
          PGADMIN_EMAIL=admin@admin.com
          PGADMIN_PASSWORD=admin
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build stack (API and front images)
        run: docker compose build api front

      - name: Build marketing ETL image (etl_db)
        run: docker compose build etl_db

      - name: Validate Compose file
        run: docker compose config -q

  mkdocs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install -r AdVise/api/requirements.txt

      - name: Build documentation
        run: mkdocs build
