# MkDocs project configuration (run `mkdocs serve` or `mkdocs build` from the repository root)
site_name: AdVise
docs_dir: docs
site_dir: site
repo_name: hovhannisyan91/pythonmicroservicedesign
repo_url: https://github.com/hovhannisyan91/pythonmicroservicedesign
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - API: api.md
  - "API (models)": api_models.md
  - Streamlit app: app.md
  - ETL: etl.md
  - Demo: demo.md
  - API Assumptions: api_assumptions.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [., AdVise]
          options:
            show_root_heading: true
            show_source: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
