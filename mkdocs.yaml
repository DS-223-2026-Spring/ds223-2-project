# MkDocs project configuration (run `mkdocs serve` or `mkdocs build` from the repository root)
site_name: AdVise
docs_dir: docs
site_dir: site
repo_name: DS-223-2026-Spring/ds223-2-project
repo_url: https://github.com/DS-223-2026-Spring/ds223-2-project
edit_uri: edit/main/docs/
# GitHub Pages project site (when enabled for this repo).
site_url: https://ds-223-2026-spring.github.io/ds223-2-project/

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - App: app.md
  - API: api.md
  - "Data Science": ds-models.md
  - "Database ERD": erd.md
  - Orchestration: orchestration.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [., AdVise]
          options:
            show_root_heading: true
            show_source: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        # Use fence_code_format so Material initializes Mermaid (fence_div_format renders as inert text).
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true
